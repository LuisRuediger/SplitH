<div class="h-full flex flex-col bg-background">

    <div class="p-6 rounded-lg shadow-sm flex flex-col flex-1 min-h-0">

        <div class="shrink-0 flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-title">Transações</h1>
                <p class="text-secondary text-sm mt-1">Gerencie as entradas e saídas</p>
            </div>

            <button
                class="px-4 py-2 flex items-center gap-2 rounded-lg font-medium text-sm text-white bg-brand transition-colors hover:bg-brand-dark cursor-pointer shadow-md">
                <i class="pi pi-plus"></i>
                Nova Transação
            </button>
        </div>

        <div class="shrink-0 flex justify-between items-center mb-4">
            <div class="relative w-72">
                <i class="pi pi-search absolute right-3 top-1/2 -translate-y-1/2 text-secondary"></i>
                <input pInputText type="text" placeholder="Buscar descrição..."
                    class="w-full pl-10 bg-background border-zinc-400/20 text-text placeholder:text-secondary rounded-lg" />
            </div>
            <button class="p-2 text-secondary hover:text-title transition-colors border border-zinc-400/20 rounded-lg">
                <i class="pi pi-filter"></i>
            </button>
        </div>

        <div class="flex-1 min-h-0 flex flex-col">
            <p-table [value]="transactionsList" [rows]="10" [paginator]="true" 
                     [scrollable]="true" scrollHeight="flex" 
                     class="h-full flex flex-col">
                
                <ng-template pTemplate="header">
                    <tr> 
                        <th class="font-medium text-sm">Date</th>
                        <th class="font-medium text-sm">Description</th>
                        <th class="font-medium text-sm">Group</th>
                        <th class="font-medium text-sm text-right">Amount</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-transaction>
                    <tr class="hover:bg-background/50 transition-colors">
                        <td class="text-text border-b border-zinc-400/10">{{ transaction.date }}</td>
                        <td class="text-title font-medium border-b border-zinc-400/10">{{ transaction.description }}</td>

                        <td class="border-b border-zinc-400/10">
                            <span class="text-xs px-2 py-1 bg-background text-secondary rounded-md border border-zinc-400/10">
                                {{ transaction.group }}
                            </span>
                        </td>

                        <td class="border-b border-zinc-400/10 text-right font-medium"
                            [ngClass]="transaction.type === 'INCOME' ? 'text-income' : 'text-expense'">
                            {{ transaction.type === 'INCOME' ? '+ ' : '- ' }}
                            {{ transaction.amount | currency:'BRL':'symbol':'1.2-2' }}
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="4" class="text-center p-8 text-secondary">
                            Nenhuma transação encontrada.
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>

    </div>
</div>
