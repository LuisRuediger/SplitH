<aside class="w-64 bg-brand-dark border-r border-brand/20 h-full flex flex-col shadow-sm">
    <nav class="flex-1 px-4 py-6 space-y-2">
        
        <a routerLink="/dashboard" routerLinkActive="bg-brand/10 text-brand" [routerLinkActiveOptions]="{exact: true}" 
           class="flex items-center gap-3 px-3 py-2 text-text rounded-lg hover:bg-background hover:text-title transition-colors cursor-pointer">
            <i class="pi pi-home"></i> 
            <span class="font-medium">Home</span>
        </a>

        <a routerLink="/transactions" routerLinkActive="bg-brand/10 text-brand"
           class="flex items-center gap-3 px-3 py-2 text-text rounded-lg hover:bg-background hover:text-title transition-colors cursor-pointer">
            <i class="pi pi-list"></i> 
            <span class="font-medium">Transações</span>
        </a>

        <div class="h-px bg-zinc-400/10 my-6"></div> 

        <div class="px-3 mb-3 flex items-center justify-between">
            <span class="text-xs font-semibold text-text uppercase tracking-wider">Meus Grupos</span>
            <button class="text-brand hover:text-brand-dark transition-colors" title="Novo Grupo">
                <i class="pi pi-plus text-sm"></i>
            </button>
        </div>
        
        <a *ngFor="let grupo of grupos" href="#" 
           class="flex items-center gap-3 px-3 py-2 text-text rounded-lg hover:bg-background hover:text-title transition-colors cursor-pointer">
            <i class="pi pi-users text-sm"></i> 
            <span class="font-medium text-sm">{{ grupo.nome }}</span>
        </a>

    </nav>
</aside>
