<aside class="w-64 bg-white border-r border-gray-200 h-full flex flex-col shadow-sm">
    <nav class="flex-1 px-4 py-6 space-y-2">
        
        <a routerLink="/dashboard" routerLinkActive="bg-blue-50 text-blue-600" [routerLinkActiveOptions]="{exact: true}" 
           class="flex items-center gap-3 px-3 py-2 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer">
            <i class="pi pi-home"></i> 
            <span class="font-medium">Home</span>
        </a>

        <a routerLink="/entradas" routerLinkActive="bg-blue-50 text-blue-600"
           class="flex items-center gap-3 px-3 py-2 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer">
            <i class="pi pi-arrow-down-left text-green-500"></i> 
            <span class="font-medium">Entradas</span>
        </a>

        <a routerLink="/saidas" routerLinkActive="bg-blue-50 text-blue-600"
           class="flex items-center gap-3 px-3 py-2 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer">
            <i class="pi pi-arrow-up-right text-red-500"></i> 
            <span class="font-medium">Saídas</span>
        </a>

        <div class="h-px bg-gray-200 my-6"></div> 

        <div class="px-3 mb-3 flex items-center justify-between">
            <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Meus Grupos</span>
            <button class="text-blue-600 hover:text-blue-800 transition-colors" title="Novo Grupo">
                <i class="pi pi-plus text-sm"></i>
            </button>
        </div>
        
        <a *ngFor="let grupo of grupos" href="#" 
           class="flex items-center gap-3 px-3 py-2 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer">
            <i class="pi pi-users text-sm"></i> 
            <span class="font-medium text-sm">{{ grupo.nome }}</span>
        </a>

    </nav>
</aside>
