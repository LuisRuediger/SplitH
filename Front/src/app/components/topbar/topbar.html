<p-toast position="top-right" />

<header class="h-[72px] bg-surface border-b border-zinc-700/30 flex items-center justify-between px-8 shrink-0 z-20">
    
    <div class="flex items-center gap-3">
        <img src="/images/logo.jpg" alt="Logo" class="h-8 w-auto rounded-md object-contain" 
             onerror="this.style.display='none'"> <span class="text-xl font-bold bg-linear-to-r from-brand to-emerald-400 bg-clip-text text-transparent">
            SplitH
        </span>
    </div>

    <div class="flex items-center gap-5">
        
        <button class="relative p-2 text-secondary hover:text-title hover:bg-zinc-700/30 rounded-full transition-all cursor-pointer">
            <i class="pi pi-bell text-lg"></i>
            <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-brand rounded-full border-2 border-surface"></span>
        </button>

        <div class="h-8 w-px bg-zinc-700/50"></div>

        <button class="flex items-center gap-3 hover:bg-zinc-700/20 p-1.5 pr-3 rounded-full transition-all cursor-pointer" 
                (click)="menu.toggle($event)">
            
            <div class="w-9 h-9 rounded-full bg-linear-to-br from-brand-dark to-brand flex items-center justify-center shadow-md">
                <span class="text-white text-sm font-bold">{{ iniciais }}</span>
            </div>
            
            <div class="flex flex-col items-start hidden sm:flex">
                <span class="text-sm font-semibold text-title leading-tight">{{ nomeUsuario }}</span>
                <span class="text-[10px] text-secondary">Minha Conta</span>
            </div>
            
            <i class="pi pi-chevron-down text-xs text-secondary ml-1 hidden sm:block"></i>
        </button>

        <p-menu #menu [model]="userMenuItems" [popup]="true" appendTo="body" styleClass="w-56 mt-2 bg-surface border border-zinc-700/50 shadow-2xl rounded-xl"></p-menu>
    </div>
</header>

<p-dialog [(visible)]="displayProfileModal" [modal]="true" [draggable]="false" [resizable]="false" header="Meu Perfil"
    styleClass="w-full max-w-[400px] bg-surface border border-zinc-700/50 shadow-2xl rounded-2xl">

    <form [formGroup]="profileForm" (ngSubmit)="onSaveProfile()" class="mt-4 flex flex-col gap-5">
        
        <div class="flex justify-center mb-2">
            <div class="relative group cursor-pointer">
                <div class="w-20 h-20 rounded-full bg-linear-to-br from-brand-dark to-brand flex items-center justify-center shadow-lg transition-transform group-hover:scale-105">
                    <span class="text-white text-3xl font-bold">{{ iniciais }}</span>
                </div>
                <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <i class="pi pi-camera text-white"></i>
                </div>
            </div>
        </div>

        <div>
            <label class="block text-xs text-secondary font-medium mb-2">Nome de Exibição</label>
            <input pInputText formControlName="name" placeholder="Seu nome"
                class="w-full bg-input border border-zinc-700/50 text-text rounded-lg focus:border-brand" />
        </div>

        <div>
            <label class="block text-xs text-secondary font-medium mb-2">Telefone</label>
            <input pInputText formControlName="phone" placeholder="(00) 00000-0000"
                class="w-full bg-input border border-zinc-700/50 text-text rounded-lg focus:border-brand" />
        </div>

        <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-zinc-700/30">
            <button type="button" (click)="hideProfileModal()"
                class="px-5 py-2.5 rounded-lg text-sm font-medium text-text bg-transparent hover:bg-zinc-700/30 transition-colors cursor-pointer">
                Cancelar
            </button>
            <button type="submit" [disabled]="isSaving"
                class="px-5 py-2.5 rounded-lg text-sm font-medium text-white bg-brand hover:bg-brand-dark transition-colors cursor-pointer shadow-md">
                <i class="pi pi-spin pi-spinner mr-2" *ngIf="isSaving"></i>
                {{ isSaving ? 'Salvando...' : 'Salvar Alterações' }}
            </button>
        </div>
    </form>
</p-dialog>
