<p-toolbar class="no-style-toolbar w-full bg-white border-b border-gray-200 shadow-sm h-16 flex items-center justify-between px-6 z-50">

    <div class="p-toolbar-group-start">
        <div class="flex items-center gap-2">
            <i class="pi pi-wallet text-blue-600 text-2xl"></i>
            <span class="text-2xl font-bold text-gray-800 tracking-tight">Split<span class="text-blue-600">H</span></span>
        </div>
    </div>

    <div class="p-toolbar-group-end flex items-center gap-4">
        <button class="text-gray-500 hover:text-blue-600 transition-colors">
            <i class="pi pi-bell text-xl"></i>
        </button>

        <div class="h-6 w-px bg-gray-300"></div>

        <div class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 p-2 rounded-lg transition-colors">
            <span class="text-sm font-medium text-gray-700">Olá, {{ nomeUsuario }}</span>
            <p-avatar icon="pi pi-user" styleClass="bg-blue-100 text-blue-600" shape="circle"></p-avatar>
        </div>
    </div>

</p-toolbar>
